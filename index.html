    <script>
      // IIFE to apply theme from localStorage before React loads, preventing FOUC (Flash of Unstyled Content)
      (function() {
        try {
          // 1. FOUC prevention for Dark Mode
          const theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }

          // 2. FOUC prevention for Primary Color
          const savedColor = localStorage.getItem('primaryColor');
          if (savedColor) {
            // Inlined theme application logic to run synchronously without external dependencies.
            const shadeColor = (color, percent) => {
              let R = parseInt(color.substring(1, 3), 16);
              let G = parseInt(color.substring(3, 5), 16);
              let B = parseInt(color.substring(5, 7), 16);
              R = parseInt(String(R * (100 + percent) / 100));
              G = parseInt(String(G * (100 + percent) / 100));
              B = parseInt(String(B * (100 + percent) / 100));
              R = (R < 255) ? R : 255; G = (G < 255) ? G : 255; B = (B < 255) ? B : 255;
              R = Math.max(0, R); G = Math.max(0, G); B = Math.max(0, B);
              const RR = ((R.toString(16).length === 1) ? "0" + R.toString(16) : R.toString(16));
              const GG = ((G.toString(16).length === 1) ? "0" + G.toString(16) : G.toString(16));
              const BB = ((B.toString(16).length === 1) ? "0" + B.toString(16) : B.toString(16));
              return "#" + RR + GG + BB;
            };

            const hoverColor = shadeColor(savedColor, -10);
            const focusRingColor = shadeColor(savedColor, 50) + '80'; // Add transparency
            
            const root = document.documentElement;
            root.style.setProperty('--primary-color', savedColor);
            root.style.setProperty('--primary-color-hover', hoverColor);
            root.style.setProperty('--primary-color-focus-ring', focusRingColor);
          }
        } catch (e) {
          // Ignore errors; default theme will apply.
        }
      })();
    </script>
